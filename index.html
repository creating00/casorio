<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boda - Portal de Fotos</title>
  <meta name="description" content="Portal de fotos de nuestra boda cristiana. Selecciona para subir fotos o ver el carrusel." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<body class="landing-body">
  <div class="dynamic-bg"></div>
  <div class="glass-container">
    <header class="home-header">
      <h1 class="elegant-title">Nuestra Boda</h1>
      <p class="verse">"Y sobre todas estas cosas vestíos de amor" - Colosenses 3:14</p>
    </header>
    <div class="module-cards">
      <a href="upload.html" class="module-card">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

      </a>
      <a href="viewer.html" class="module-card">

        <p>Disfruta de la presentación de fotos y recuerdos.</p>
      </a>
      <a href="saludos.html" class="module-card">
        <div class="icon-wrap">

        </div>
        <h2>Mandar Saludo</h2>
        <p>Escribe un mensaje para que aparezca en el carrusel.</p>
      </a>
    </div>
  </div>
