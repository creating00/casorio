<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subir Fotos - Nuestra Boda</title>
  <meta name="description" content="Sube las fotos de nuestra boda." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="upload-body">
  <div class="dynamic-bg"></div>
  <nav class="top-nav">
    <a href="index.html" class="back-btn">&larr; Volver</a>
  </nav>
  
  <main class="glass-container upload-container">
    <header class="upload-header">
      <h2>Compartir Momentos</h2>
      <p>Sube las fotos que tomaste durante nuestra boda. ¡Las veremos todas en la pantalla principal!</p>
    </header>

    <div class="drop-zone" id="dropZone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p>Arrastra tus fotos aquí o haz clic para seleccionar</p>
      <label for="photoInput" class="select-btn">Seleccionar Archivos</label>
      <input id="photoInput" type="file" accept="image/*" multiple hidden />
    </div>

    <div id="uploadStatus" class="status-box hidden">
      <!-- Status messages and progress -->
    </div>
  </main>

  <script src="upload.js"></script>
</body>
</html>
