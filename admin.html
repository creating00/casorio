<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administracion de Fotos</title>
  <meta name="description" content="Portal privado para administrar las fotos subidas." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-body">
  <div class="dynamic-bg"></div>

  <main class="glass-container admin-container">
    <header class="admin-header">
      <p class="admin-eyebrow">Portal privado</p>
      <h1>Administracion de Fotos</h1>
      <p>Revisa las fotos subidas y elimina las que no quieras conservar.</p>
    </header>

    <div id="adminStatus" class="status-box hidden"></div>

    <section id="adminEmpty" class="admin-empty hidden">
      <p>No hay fotos subidas todavia.</p>
    </section>

    <section id="adminGrid" class="admin-grid" aria-live="polite"></section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
